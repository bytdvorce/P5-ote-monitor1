<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceny Elektřiny Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: auto; padding-bottom: 50px; }
        h1 { text-align: center; color: #00e676; font-size: 1.5em; margin: 20px 0; }
        .stats { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 12px; border-radius: 8px; text-align: center; flex: 1; border: 1px solid #333; }
        .card h2 { font-size: 0.8em; margin: 0; color: #888; text-transform: uppercase; }
        .card p { font-size: 1.3em; font-weight: bold; margin: 5px 0 0; color: #00e676; }
        .chart-container { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px solid #333; height: 450px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ceny Elektřiny</h1>
        <div class="stats">
            <div class="card"><h2>Aktuální Cena</h2><p id="curr-price">--</p></div>
            <div class="card"><h2>Tarif</h2><p id="curr-tarif">--</p></div>
            <div class="card"><h2>Výkup</h2><p id="curr-sell">--</p></div>
        </div>
        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>
    </div>

    <script>
        let priceChart;

        function updateDashboard() {
            Papa.parse("ceny_final_5min.csv", {
                download: true,
                header: true,
                delimiter: ";",
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    
                    // Příprava dat pro graf
                    const labels = data.map(d => d.Cas);
                    const cenaKonecna = data.map(d => parseFloat(d.Cena_Konecna));
                    const sell = data.map(d => parseFloat(d.Sell));
                    const fix = data.map(d => parseFloat(d.Fix));
                    const plyn = data.map(d => parseFloat(d.Plyn));

                    // Aktualizace horních karet (poslední platný záznam)
                    const lastRow = data[data.length - 1];
                    if (lastRow) {
                        document.getElementById('curr-price').innerText = lastRow.Cena_Konecna + " Kč";
                        document.getElementById('curr-tarif').innerText = lastRow.Tarif;
                        document.getElementById('curr-sell').innerText = lastRow.Sell + " Kč";
                    }

                    const ctx = document.getElementById('priceChart').getContext('2d');
                    
                    if (priceChart) priceChart.destroy();

                    priceChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { 
                                    label: 'Cena Konečná', 
                                    data: cenaKonecna, 
                                    borderColor: '#00e676', 
                                    backgroundColor: 'rgba(0, 230, 118, 0.1)', // Vybarvená plocha
                                    fill: true, 
                                    borderWidth: 2, 
                                    pointRadius: 0, 
                                    tension: 0.2 
                                },
                                { 
                                    label: 'Sell', 
                                    data: sell, 
                                    borderColor: '#2196f3', 
                                    fill: false,
                                    borderWidth: 1.5, // Standardní tloušťka
                                    pointRadius: 0, 
                                    tension: 0.1 
                                },
                                { 
                                    label: 'Fix', 
                                    data: fix, 
                                    borderColor: '#ff9800', 
                                    fill: false,
                                    borderWidth: 0.7, // Tenká linka
                                    pointRadius: 0, 
                                    tension: 0.1 
                                },
                                { 
                                    label: 'Plyn', 
                                    data: plyn, 
                                    borderColor: '#f44336', 
                                    fill: false,
                                    borderWidth: 0.7, // Tenká linka
                                    pointRadius: 0, 
                                    tension: 0.1 
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            scales: { 
                                x: { 
                                    grid: { display: false },
                                    ticks: { color: '#888', autoSkip: true, maxTicksLimit: 12 }
                                }, 
                                y: { 
                                    grid: { color: '#333' },
                                    ticks: { color: '#888' }
                                } 
                            },
                            plugins: { 
                                legend: { 
                                    position: 'top', 
                                    labels: { color: 'white', boxWidth: 15, padding: 15 } 
                                } 
                            }
                        }
                    });
                }
            });
        }

        updateDashboard();
        setInterval(updateDashboard, 120000);
    </script>
</body>
</html>
